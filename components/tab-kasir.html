<div id="tab-kasir" class="space-y-6">
    <div class="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center bg-dark-6 p-4 rounded-2xl border border-dark-4 shadow-sm">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-80">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-dark-3 text-sm">🔍</span>
                <input type="text" id="search-input" placeholder="Cari nama barang atau scan barcode..." class="w-full pl-9 pr-4 py-2.5 bg-dark-7 text-sm rounded-xl border border-dark-4 focus:outline-none focus:border-mantine-blue focus:ring-1 focus:ring-mantine-blue text-gray-100 placeholder-dark-3 transition-all" autocomplete="off">
            </div>
            <select id="category-filter" class="px-3 py-2.5 bg-dark-7 text-sm rounded-xl border border-dark-4 text-gray-200 focus:outline-none focus:border-mantine-blue">
                <option value="Semua">Semua Kategori</option>
            </select>
        </div>
        <div id="active-shift-widget" class="w-full md:w-auto flex items-center justify-between md:justify-end gap-3 bg-dark-7 px-4 py-2 rounded-xl border border-dark-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-mantine-green animate-pulse"></span>
                <div class="text-left">
                    <p class="text-[10px] uppercase text-dark-2 font-bold tracking-wider">Sesi Kasir Aktif</p>
                    <p id="widget-shift-name" class="text-xs font-semibold text-gray-200 truncate">-</p>
                </div>
            </div>
            <button onclick="bukaModalTutupShift()" class="text-xs font-medium px-2.5 py-1.5 bg-mantine-red/10 text-mantine-red hover:bg-mantine-red hover:text-white rounded-lg transition-colors">Tutup Sesi</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
        <div class="md:col-span-7 lg:col-span-7 space-y-4">
            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[calc(100vh-13.5rem)] overflow-y-auto pr-1 no-scrollbar"></div>
        </div>
        <div class="md:col-span-5 lg:col-span-5 bg-dark-6 rounded-2xl border border-dark-4 shadow-xl flex flex-col h-[calc(100vh-5.5rem)] relative -mt-[4.5rem] md:mt-0 overflow-hidden">
            <div class="p-4 border-b border-dark-4 bg-dark-8/40 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-lg">🛒</span>
                    <h2 class="font-bold text-sm text-gray-200 tracking-wide">Daftar Belanja</h2>
                </div>
                <button onclick="clearCart()" class="text-xs text-dark-2 hover:text-mantine-red font-medium transition-colors">Kosongkan</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar bg-dark-7/20"></div>
            <div class="p-4 bg-dark-8/60 border-t border-dark-4 space-y-3 shrink-0">
                <div class="space-y-1.5 text-xs text-dark-1 border-b border-dark-4/60 pb-3">
                    <div class="flex justify-between"><span>Subtotal</span><span id="summary-subtotal" class="font-medium text-gray-200">Rp 0</span></div>
                    <div class="flex justify-between items-center hidden-feature" id="row-feature-member">
                        <span class="flex items-center gap-1">👥 Pelanggan <button onclick="bukaModalPilihMember()" id="btn-select-member-badge" class="text-[10px] text-mantine-blue hover:underline font-semibold">[Pilih]</button></span>
                        <span id="summary-member-name" class="font-medium text-gray-300 truncate max-w-[150px]">Umum</span>
                    </div>
                    <div class="flex justify-between items-center hidden-feature" id="row-feature-voucher">
                        <span class="flex items-center gap-1">🎟️ Voucher <button onclick="bukaModalKlaimVoucher()" class="text-[10px] text-mantine-orange hover:underline font-semibold">[Klaim]</button></span>
                        <span id="summary-voucher-code" class="font-medium text-mantine-orange font-mono">Tidak Ada</span>
                    </div>
                    <div class="flex justify-between"><span>Pajak & Biaya Layanan</span><span id="summary-tax-service" class="font-medium text-gray-200">Rp 0</span></div>
                    <div class="flex justify-between text-mantine-red bg-mantine-red/5 px-2 py-1 rounded hidden" id="summary-discount-row"><span>Diskon</span><span id="summary-discount">Rp 0</span></div>
                </div>
                <div class="flex justify-between items-center py-1">
                    <span class="text-xs font-semibold text-gray-300">Total Akhir</span>
                    <span id="summary-grand-total" class="text-xl font-black text-mantine-blue tracking-tight">Rp 0</span>
                </div>
                <div class="grid grid-cols-3 gap-2 pt-1">
                    <button onclick="setPaymentMethod('Tunai')" id="pay-method-tunai" class="py-2 rounded-xl text-xs font-bold border transition-all bg-mantine-blue/10 border-mantine-blue text-mantine-blue shadow-sm">💵 Tunai</button>
                    <button onclick="setPaymentMethod('Non-Tunai')" id="pay-method-nontunai" class="py-2 rounded-xl text-xs font-bold border border-dark-4 bg-dark-5 text-dark-1 hover:text-gray-200 transition-all">💳 QRIS/Debit</button>
                    <button onclick="setPaymentMethod('Kasbon')" id="pay-method-kasbon" class="py-2 rounded-xl text-xs font-bold border border-dark-4 bg-dark-5 text-dark-1 hover:text-gray-200 transition-all">📝 Kasbon</button>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button onclick="bukaModalHoldBill()" class="py-2.5 bg-dark-5 hover:bg-dark-4 text-gray-200 font-semibold rounded-xl text-xs border border-dark-4 transition-colors hidden-feature" id="btn-hold-bill-feature">⏸️ Tahan</button>
                    <button onclick="prosesTransaksiSelesai()" class="py-2.5 bg-mantine-blue hover:bg-mantine-blue/90 text-white font-bold rounded-xl text-xs shadow-lg shadow-mantine-blue/20 transition-all flex items-center justify-center gap-1 col-span-2" id="btn-submit-bayar">⚡ Bayar Sekarang (F8)</button>
                </div>
            </div>
        </div>
    </div>
</div>
