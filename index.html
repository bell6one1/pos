<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Modern - Kasir, Stok & Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; max-width: 300px; padding: 10px; font-family: monospace; }
        }
        /* Hide scrollbar utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">

    <!-- ================= STATE LOADING AWAL ================= -->
    <div id="auth-loading" class="fixed inset-0 bg-gray-50 flex flex-col items-center justify-center z-[100]">
        <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs text-gray-400 mt-3 tracking-wide">Menghubungkan ke sistem...</p>
    </div>

    <!-- ================= HALAMAN LOGIN (MINIMALIS) ================= -->
    <div id="login-screen" class="hidden fixed inset-0 bg-gray-50 flex items-center justify-center z-[90] p-4">
        <div class="bg-white p-6 sm:p-8 rounded-2xl border border-gray-100 shadow-sm w-full max-w-sm">
            <div class="text-center mb-6">
                <span class="text-2xl font-bold text-gray-900 tracking-tight">PointOfSale.</span>
                <p class="text-xs text-gray-400 mt-1">Silakan masuk ke akun kasir/admin Anda</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                    <input type="email" id="login-email" required placeholder="nama@toko.com" 
                        class="w-full px-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••" 
                        class="w-full px-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button type="submit" id="btn-login-submit" 
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-xl transition-all shadow-sm">
                    Masuk Aplikasi
                </button>
            </form>
        </div>
    </div>

    <!-- ================= CORE APLIKASI (Hanya muncul jika lolos Auth) ================= -->
    <div id="app-screen" class="hidden">
        <!-- Top Navigation -->
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex h-full items-center gap-6 sm:gap-8 overflow-x-auto no-scrollbar">
                        <span class="text-xl font-bold text-gray-900 tracking-tight pr-2 hidden sm:inline">PointOfSale.</span>
                        <div class="flex h-full space-x-1 pt-2 min-w-max">
                            <button id="tab-kasir-btn" class="nav-tab border-b-2 border-blue-600 text-blue-600 px-3 text-sm font-medium h-full transition-all">
                                🎯 Menu Kasir
                            </button>
                            <button id="tab-gudang-btn" class="nav-tab border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-3 text-sm font-medium h-full transition-all">
                                📦 Gudang (CRUD)
                            </button>
                            <button id="tab-riwayat-btn" class="nav-tab border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-3 text-sm font-medium h-full transition-all">
                                🧾 Riwayat
                            </button>
                        </div>
                    </div>
                    <!-- Tombol Keluar / Sign Out -->
                    <button id="btn-logout" class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-xl transition-colors">
                        Keluar 🚪
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Container -->
        <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">

            <!-- ================= TAB KASIR ================= -->
            <div id="tab-kasir" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Katalog Produk</h2>
                    <div id="kasir-katalog" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm h-fit sticky top-24">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Keranjang Belanja</h2>
                    <div id="cart-list" class="space-y-3 max-h-60 overflow-y-auto mb-4 pr-1 no-scrollbar"></div>
                    <hr class="border-gray-100 my-4">
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between text-gray-500">
                            <span>Total Item</span>
                            <span id="cart-total-qty" class="font-medium text-gray-800">0</span>
                        </div>
                        <div class="flex justify-between text-base font-bold text-gray-900 pt-1">
                            <span>Total Harga</span>
                            <span id="cart-total-price">Rp 0</span>
                        </div>
                    </div>
                    <div class="mt-4 space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Uang Dibayar (Rp)</label>
                            <input type="number" id="cash-paid" placeholder="Masukkan nominal" min="0"
                                class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="flex justify-between text-sm font-semibold bg-gray-50 p-3 rounded-xl">
                            <span class="text-gray-500">Kembalian</span>
                            <span id="cash-return" class="text-gray-900">Rp 0</span>
                        </div>
                        <button id="btn-checkout" disabled class="w-full py-3 bg-gray-300 text-gray-500 font-medium rounded-xl cursor-not-allowed transition-all shadow-sm">
                            Proses Bayar & Cetak
                        </button>
                    </div>
                </div>
            </div>

            <!-- ================= TAB GUDANG ================= -->
            <div id="tab-gudang" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div>
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm sticky top-24">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4" id="form-title">Tambah Barang Baru</h2>
                        <form id="item-form" class="space-y-4">
                            <input type="hidden" id="item-id">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Nama Barang</label>
                                <input type="text" id="item-name" required placeholder="Contoh: Gas LPG 3kg" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Harga Jual (Rp)</label>
                                <input type="number" id="item-price" required placeholder="0" min="0" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Stok Awal</label>
                                <input type="number" id="item-stock" required placeholder="0" min="0" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="button" id="btn-cancel" class="hidden flex-1 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">Batal</button>
                                <button type="submit" id="btn-submit" class="flex-1 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition-colors">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Master Data Barang</h2>
                    <div id="gudang-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- ================= TAB RIWAYAT TRANSAKSI ================= -->
            <div id="tab-riwayat" class="tab-content hidden">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Riwayat Transaksi Penjualan</h2>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto no-scrollbar">
                        <table class="min-w-full divide-y divide-gray-200 text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Waktu</th>
                                    <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Item Terjual</th>
                                    <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Total Harga</th>
                                    <th class="px-6 py-3 text-right font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="riwayat-list" class="bg-white divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- AREA CETAK STRUK HIDDEN -->
    <div id="print-area" class="hidden text-black bg-white"></div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, increment, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration (Permanent)
        const firebaseConfig = {
            apiKey: "AIzaSyAsLKh24L8KxN8vqUgLQujmrfeVzc0F9YM",
            authDomain: "pos-system-ef6ee.firebaseapp.com",
            projectId: "pos-system-ef6ee",
            storageBucket: "pos-system-ef6ee.firebasestorage.app",
            messagingSenderId: "1090528334356",
            appId: "1:1090528334356:web:ef7bddb8fe623427538d01"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const itemsRef = collection(db, "barang");
        const salesRef = collection(db, "penjualan");

        let databaseBarang = [];
        let riwayatPenjualan = [];
        let keranjang = [];
        let unsubscribeItems = null;
        let unsubscribeSales = null;

        const toRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);
        const formatTanggal = (timestamp) => {
            if(!timestamp) return 'Memproses...';
            return new Date(timestamp.seconds * 1000).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
        };

        // ================= AUTHENTICATION LOGIC =================
        const authLoading = document.getElementById('auth-loading');
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginForm = document.getElementById('login-form');

        // Monitor Perubahan Status Login
        onAuthStateChanged(auth, (user) => {
            authLoading.classList.add('hidden'); // Matikan splash screen awal
            
            if (user) {
                // User Berhasil Login
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                initRealtimeListeners(); // Jalankan sinkronisasi database
            } else {
                // User Belum Login / Logout
                appScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                stopRealtimeListeners(); // Putuskan koneksi database demi keamanan
            }
        });

        // Handler Proses Sign In
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btnSubmit = document.getElementById('btn-login-submit');

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Memverifikasi...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginForm.reset();
            } catch (error) {
                console.error(error);
                alert("Login Gagal! Periksa kembali email dan password Anda.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Masuk Aplikasi";
            }
        });

        // Handler Proses Sign Out
        document.getElementById('btn-logout').addEventListener('click', () => {
            if(confirm("Apakah Anda yakin ingin keluar dari sistem POS?")) {
                signOut(auth).then(() => {
                    keranjang = [];
                    renderKeranjang();
                });
            }
        });

        // ================= REAL-TIME LIFECYCLE CONTROLLERS =================
        function initRealtimeListeners() {
            unsubscribeItems = onSnapshot(query(itemsRef, orderBy("nama", "asc")), (snapshot) => {
                databaseBarang = [];
                snapshot.forEach(doc => databaseBarang.push({ id: doc.id, ...doc.data() }));
                renderKatalogKasir();
                renderGudangList();
                sinkronisasiKeranjang();
            });

            unsubscribeSales = onSnapshot(query(salesRef, orderBy("waktu", "desc")), (snapshot) => {
                riwayatPenjualan = [];
                snapshot.forEach(doc => riwayatPenjualan.push({ id: doc.id, ...doc.data() }));
                renderRiwayatList();
            });
        }

        function stopRealtimeListeners() {
            if(unsubscribeItems) unsubscribeItems();
            if(unsubscribeSales) unsubscribeSales();
        }

        // ================= TAB NAVIGATION =================
        const tabs = ['kasir', 'gudang', 'riwayat'];
        tabs.forEach(tab => {
            document.getElementById(`tab-${tab}-btn`).addEventListener('click', (e) => {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.nav-tab').forEach(btn => {
                    btn.className = "nav-tab border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-3 text-sm font-medium h-full transition-all";
                });
                document.getElementById(`tab-${tab}`).classList.remove('hidden');
                e.target.className = "nav-tab border-b-2 border-blue-600 text-blue-600 px-3 text-sm font-medium h-full transition-all";
            });
        });

        // ================= LOGIC KASIR & KERANJANG =================
        function renderKatalogKasir() {
            const el = document.getElementById('kasir-katalog');
            el.innerHTML = '';
            databaseBarang.forEach(b => {
                const isHabis = b.stok <= 0;
                el.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center ${isHabis ? 'opacity-60' : 'hover:shadow-md'}">
                        <div>
                            <h3 class="font-medium text-gray-900">${b.nama}</h3>
                            <p class="text-sm font-semibold text-blue-600 mt-1">${toRupiah(b.harga)}</p>
                            <span class="inline-block text-xs mt-2 px-2 py-0.5 ${isHabis ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-600'} rounded-md">Stok: ${b.stok}</span>
                        </div>
                        <button class="px-4 py-2 text-xs font-semibold rounded-xl ${isHabis ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}" 
                            onclick="window.tambahCart('${b.id}')" ${isHabis ? 'disabled' : ''}>${isHabis ? 'Habis' : 'Tambah'}</button>
                    </div>`;
            });
        }

        window.tambahCart = (id) => {
            const b = databaseBarang.find(x => x.id === id);
            const item = keranjang.find(x => x.id === id);
            if (item) {
                if (item.qty >= b.stok) return alert("Melebihi batas stok tersedia!");
                item.qty++;
            } else {
                keranjang.push({ id: b.id, nama: b.nama, harga: b.harga, qty: 1 });
            }
            renderKeranjang();
        };

        window.ubahQty = (id, n) => {
            const item = keranjang.find(x => x.id === id);
            const b = databaseBarang.find(x => x.id === id);
            item.qty += n;
            if (item.qty > b.stok) item.qty = b.stok;
            if (item.qty <= 0) keranjang = keranjang.filter(x => x.id !== id);
            renderKeranjang();
        };

        function sinkronisasiKeranjang() {
            keranjang.forEach((item, i) => {
                const b = databaseBarang.find(x => x.id === item.id);
                if (!b) keranjang.splice(i, 1);
                else if (item.qty > b.stok) { item.qty = b.stok; if(item.qty<=0) keranjang.splice(i, 1); }
            });
            renderKeranjang();
        }

        let globalTotalHarga = 0;
        const cashInput = document.getElementById('cash-paid');
        const btnCheckout = document.getElementById('btn-checkout');

        function renderKeranjang() {
            const el = document.getElementById('cart-list');
            el.innerHTML = keranjang.length ? '' : `<div class="text-center py-6 text-gray-400 text-xs">Keranjang kosong</div>`;
            let total = 0, qty = 0;

            keranjang.forEach(item => {
                total += (item.harga * item.qty);
                qty += item.qty;
                el.innerHTML += `
                    <div class="flex items-center justify-between text-sm bg-gray-50 p-3 rounded-xl">
                        <div class="flex-1 pr-2">
                            <h4 class="font-medium text-gray-800 line-clamp-1">${item.nama}</h4>
                            <span class="text-xs text-gray-500">${toRupiah(item.harga)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="w-6 h-6 bg-white border border-gray-200 rounded-md font-bold" onclick="window.ubahQty('${item.id}', -1)">-</button>
                            <span class="w-6 text-center font-medium">${item.qty}</span>
                            <button class="w-6 h-6 bg-white border border-gray-200 rounded-md font-bold" onclick="window.ubahQty('${item.id}', 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total-qty').textContent = qty;
            globalTotalHarga = total;
            document.getElementById('cart-total-price').textContent = toRupiah(total);
            cekBayar();
        }

        cashInput.addEventListener('input', cekBayar);
        function cekBayar() {
            const bayar = Number(cashInput.value);
            if (globalTotalHarga > 0 && bayar >= globalTotalHarga) {
                document.getElementById('cash-return').textContent = toRupiah(bayar - globalTotalHarga);
                btnCheckout.disabled = false;
                btnCheckout.className = "w-full py-3 bg-emerald-600 text-white font-medium rounded-xl hover:bg-emerald-700 transition-all shadow-md cursor-pointer";
            } else {
                document.getElementById('cash-return').textContent = "Rp 0";
                btnCheckout.disabled = true;
                btnCheckout.className = "w-full py-3 bg-gray-300 text-gray-500 font-medium rounded-xl cursor-not-allowed";
            }
        }

        btnCheckout.addEventListener('click', async () => {
            btnCheckout.disabled = true;
            btnCheckout.textContent = "Memproses...";
            const uangBayar = Number(cashInput.value);
            const kembalian = uangBayar - globalTotalHarga;

            try {
                for (const item of keranjang) {
                    await updateDoc(doc(db, "barang", item.id), { stok: increment(-item.qty) });
                }
                
                const dataPenjualan = {
                    waktu: serverTimestamp(),
                    items: keranjang,
                    totalBelanja: globalTotalHarga,
                    uangBayar: uangBayar,
                    kembalian: kembalian
                };
                const docRef = await addDoc(salesRef, dataPenjualan);
                cetakStruk({ id: docRef.id, ...dataPenjualan, waktu: new Date() });

                keranjang = []; cashInput.value = ''; renderKeranjang();
            } catch (err) {
                console.error(err); alert("Gagal memproses transaksi!");
            } finally {
                btnCheckout.textContent = "Proses Bayar & Cetak";
            }
        });

        // ================= PRINT ENGINE =================
        window.cetakStrukDariRiwayat = (index) => {
            cetakStruk(riwayatPenjualan[index]);
        };

        function cetakStruk(data) {
            const printArea = document.getElementById('print-area');
            let itemHtml = '';
            data.items.forEach(item => {
                itemHtml += `
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px;">
                        <span>${item.nama} (x${item.qty})</span>
                        <span>${toRupiah(item.harga * item.qty)}</span>
                    </div>`;
            });

            const tglStruk = data.waktu && data.waktu.seconds ? new Date(data.waktu.seconds * 1000) : new Date();

            printArea.innerHTML = `
                <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                    <h2 style="margin:0; font-size:18px;">PointOfSale.</h2>
                    <p style="margin:0; font-size:12px;">Toko Sembako & Gas</p>
                    <p style="margin:0; font-size:10px; color:#555;">${tglStruk.toLocaleString('id-ID')}</p>
                </div>
                ${itemHtml}
                <div style="border-top:1px dashed #000; margin-top:10px; padding-top:10px;">
                    <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:bold;">
                        <span>TOTAL</span>
                        <span>${toRupiah(data.totalBelanja)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px;">
                        <span>Tunai</span>
                        <span>${toRupiah(data.uangBayar)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px;">
                        <span>Kembali</span>
                        <span>${toRupiah(data.kembalian)}</span>
                    </div>
                </div>
                <div style="text-align:center; margin-top:20px; font-size:12px;">
                    <p>Terima Kasih Atas Kunjungan Anda!</p>
                </div>
            `;
            printArea.classList.remove('hidden');
            window.print();
            printArea.classList.add('hidden');
        }

        // ================= RIWAYAT TRANSAKSI (UI) =================
        function renderRiwayatList() {
            const el = document.getElementById('riwayat-list');
            el.innerHTML = '';
            if(riwayatPenjualan.length === 0) {
                el.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">Belum ada transaksi.</td></tr>`;
                return;
            }

            riwayatPenjualan.forEach((trx, index) => {
                const itemNames = trx.items.map(i => `${i.nama} (${i.qty}x)`).join(', ');
                el.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-gray-900">${formatTanggal(trx.waktu)}</td>
                        <td class="px-6 py-4 text-gray-500 max-w-xs truncate" title="${itemNames}">${itemNames}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${toRupiah(trx.totalBelanja)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right">
                            <button onclick="window.cetakStrukDariRiwayat(${index})" class="text-blue-600 hover:text-blue-900 font-medium bg-blue-50 px-3 py-1 rounded-md text-xs">Cetak Ulang</button>
                        </td>
                    </tr>`;
            });
        }

        // ================= GUDANG LOGIC (CRUD) =================
        const form = document.getElementById('item-form');
        let isEditing = false;

        function renderGudangList() {
            const el = document.getElementById('gudang-list');
            el.innerHTML = '';
            databaseBarang.forEach(b => {
                el.innerHTML += `
                    <div class="bg-white p-4 sm:p-5 rounded-2xl border border-gray-100 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <h3 class="font-medium text-gray-900">${b.nama}</h3>
                            <div class="flex items-center gap-3 mt-1">
                                <span class="text-sm font-semibold text-blue-600">${toRupiah(b.harga)}</span>
                                <span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded-md">Stok: ${b.stok}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.editBrg('${b.id}')" class="px-4 py-2 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-xl">Edit</button>
                            <button onclick="window.hapusBrg('${b.id}')" class="px-4 py-2 text-xs font-medium text-red-700 bg-red-50 hover:bg-red-100 rounded-xl">Hapus</button>
                        </div>
                    </div>`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = "Menyimpan...";
            const data = {
                nama: document.getElementById('item-name').value.trim(),
                harga: Number(document.getElementById('item-price').value),
                stok: Number(document.getElementById('item-stock').value)
            };
            try {
                if (isEditing) await updateDoc(doc(db, "barang", document.getElementById('item-id').value), data);
                else await addDoc(itemsRef, data);
                window.resetForm();
            } catch (err) { alert("Error menyimpan data!"); }
            btn.disabled = false; btn.textContent = "Simpan";
        });

        window.editBrg = (id) => {
            isEditing = true;
            const b = databaseBarang.find(x => x.id === id);
            document.getElementById('item-id').value = b.id;
            document.getElementById('item-name').value = b.nama;
            document.getElementById('item-price').value = b.harga;
            document.getElementById('item-stock').value = b.stok;
            document.getElementById('form-title').textContent = "Edit Produk";
            document.getElementById('btn-cancel').classList.remove('hidden');
        };

        window.hapusBrg = async (id) => {
            if(confirm("Hapus barang permanen dari database gundang?")) await deleteDoc(doc(db, "barang", id));
        };

        window.resetForm = () => {
            isEditing = false;
            form.reset();
            document.getElementById('form-title').textContent = "Tambah Barang";
            document.getElementById('btn-cancel').classList.add('hidden');
        };
        document.getElementById('btn-cancel').addEventListener('click', window.resetForm);

    </script>
</body>
</html>
