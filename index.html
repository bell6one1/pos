<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Modern Pro - Enterprise Edition</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="theme-color" content="#1A1B1E">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <style id="dynamic-theme"></style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: {
                            0: '#C1C2C5', 1: '#A6A7AB', 2: '#909296', 3: '#5C5F66',
                            4: '#373A40', 5: '#2C2E33', 6: '#25262B', 7: '#1A1B1E', 8: '#141517'
                        },
                        mantine: { blue: '#1971c2', green: '#2b8a3e', red: '#c92a2a', orange: '#e65c00' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-dark-7 text-gray-100 font-sans selection:bg-mantine-blue/30 selection:text-mantine-blue h-screen overflow-hidden flex">

    <div id="app-loader"
        class="fixed inset-0 bg-dark-7 z-[9999] flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div
                class="w-12 h-12 border-4 border-mantine-blue border-t-transparent rounded-full animate-spin mx-auto mb-4">
            </div>
            <p class="text-dark-1 font-medium">Memuat Sistem POS Enterprise...</p>
        </div>
    </div>

    <div id="inject-sidebar"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
        <main class="flex-1 overflow-y-auto no-scrollbar p-4 lg:p-6 pb-24 lg:pb-6 relative z-10 w-full">

            <div id="inject-tab-kasir"></div>
            <div id="inject-tab-barang"></div>
            <div id="inject-tab-laporan"></div>
            <div id="inject-tab-member"></div>
            <div id="inject-tab-pengaturan"></div>

        </main>
    </div>

    <div id="inject-modals"></div>

    <div id="print-area" class="hidden text-black bg-white"></div>

    <script type="module" src="./app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>
</body>

</html>
